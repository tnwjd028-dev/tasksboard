<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f5;min-height:100vh;color:#1a1a2e}

/* ── Header / Nav ── */
.header{background:#1a1a2e;padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header-title{color:#fff;font-size:1rem;font-weight:600;letter-spacing:.04em}
.header-right{display:flex;align-items:center;gap:.75rem}
.header-date{color:#8892b0;font-size:.72rem}
.sync-pill{display:flex;align-items:center;gap:.35rem;font-size:.7rem;padding:.22rem .6rem;border-radius:20px;background:rgba(255,255,255,.08);cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;color:#8892b0;transition:background .15s}
.sync-pill:hover{background:rgba(255,255,255,.14)}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sync-dot.none{background:#6b7280}.sync-dot.loading{background:#6366f1;animation:pulse .8s infinite}
.sync-dot.saving{background:#f59e0b;animation:pulse .8s infinite}.sync-dot.synced{background:#10b981}.sync-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav{background:#fff;border-bottom:1px solid #e8eaf0;display:flex;padding:0 1.5rem;position:sticky;top:46px;z-index:100;overflow-x:auto}
.nav-btn{padding:.72rem 1.1rem;font-size:.8rem;font-weight:500;border:none;background:none;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;white-space:nowrap;transition:all .18s;font-family:'Noto Sans KR',sans-serif}
.nav-btn.active{color:#1a1a2e;border-bottom-color:#4f46e5}
.content{padding:1.2rem 1.5rem;max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:1rem}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.col-span-2{grid-column:1/-1}
.card{background:#fff;border-radius:13px;padding:1rem;border:1px solid #e8eaf0;transition:border-color .18s,box-shadow .18s}
.card.drag-over{border-color:#6366f1;box-shadow:0 0 0 3px #eef2ff}
.card-strip{height:3px;border-radius:2px;margin:-.1rem 0 .6rem}
.strip-a{background:linear-gradient(90deg,#ef4444,#f97316)}
.strip-b{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.strip-c{background:linear-gradient(90deg,#10b981,#34d399)}
.strip-d{background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.strip-e{background:linear-gradient(90deg,#fb923c,#fbbf24)}
.strip-f{background:linear-gradient(90deg,#94a3b8,#cbd5e1)}
.strip-done{background:linear-gradient(90deg,#6b7280,#9ca3af)}
.strip-date{background:linear-gradient(90deg,#0ea5e9,#38bdf8)}
.card-header{display:flex;align-items:center;gap:.45rem;margin-bottom:.65rem}
.badge{font-size:.65rem;font-weight:700;padding:.16rem .45rem;border-radius:5px}
.badge-a{background:#fee2e2;color:#b91c1c}
.badge-b{background:#fef3c7;color:#92400e}
.badge-c{background:#d1fae5;color:#065f46}
.badge-d{background:#ede9fe;color:#5b21b6}
.badge-e{background:#ffedd5;color:#9a3412}
.badge-f{background:#f1f5f9;color:#475569}
.badge-done{background:#f3f4f6;color:#4b5563}
.card-title{font-size:.82rem;font-weight:600;color:#111827;flex:1}
.count-badge{font-size:.65rem;background:#f3f4f6;color:#6b7280;border-radius:10px;padding:.08rem .38rem}
.add-task-btn{margin-left:auto;width:22px;height:22px;border-radius:6px;border:1.5px dashed #d1d5db;background:none;cursor:pointer;font-size:.95rem;color:#9ca3af;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.add-task-btn:hover{border-color:#6366f1;color:#6366f1;background:#eef2ff;border-style:solid}
.memo-dot{width:7px;height:7px;border-radius:50%;background:#e5e7eb;flex-shrink:0;margin-top:4px;border:1.5px solid #d1d5db;cursor:pointer;transition:all .12s}
.memo-dot.has-memo{background:#818cf8;border-color:#6366f1}

/* ── Task items ── */
.task-list{display:flex;flex-direction:column;gap:.28rem;min-height:32px}
.task-item{display:flex;align-items:flex-start;gap:.45rem;padding:.44rem .55rem;border-radius:8px;background:#f9fafb;border:1px solid #f0f1f3;cursor:grab;user-select:none;transition:all .12s}
.task-item:hover{background:#f3f4f6;border-color:#e5e7eb}
.task-item.has-memo-bg{border-left:3px solid #c7d2fe}
.task-item.dragging{opacity:.3;cursor:grabbing}
.task-item.daily-done-today{opacity:.55;background:#f9fafb}
.task-checkbox{width:15px;height:15px;border-radius:4px;cursor:pointer;flex-shrink:0;margin-top:2px;accent-color:#4f46e5}
.task-text{font-size:.79rem;color:#374151;flex:1;line-height:1.45}
.task-text.crossed{text-decoration:line-through;color:#9ca3af}
.task-text.daily-done-text{text-decoration:line-through;color:#9ca3af}
.daily-reset-badge{font-size:.6rem;background:#d1fae5;color:#065f46;border-radius:4px;padding:.08rem .3rem;white-space:nowrap;flex-shrink:0;margin-top:2px}
.edit-btn{opacity:0;font-size:.62rem;padding:.11rem .32rem;border-radius:4px;border:1px solid #e5e7eb;background:#fff;cursor:pointer;color:#6b7280;transition:all .12s;flex-shrink:0;margin-top:1px;font-family:'Noto Sans KR',sans-serif;line-height:1.4}
.task-item:hover .edit-btn,.e-chip:hover .edit-btn{opacity:1}
.edit-btn:hover{background:#eef2ff;border-color:#a5b4fc;color:#4f46e5}
.task-due{font-size:.66rem;color:#9ca3af;cursor:pointer;padding:.1rem .35rem;border-radius:5px;border:1px solid #e5e7eb;background:#fff;white-space:nowrap;flex-shrink:0;transition:all .12s;margin-top:1px}
.task-due:hover{background:#eef2ff;border-color:#a5b4fc;color:#4f46e5}
.task-due.urgent{color:#dc2626;border-color:#fca5a5;background:#fff5f5;font-weight:600}
.task-due.nodate{color:#d1d5db;border-style:dashed}
.drop-hint{font-size:.71rem;color:#d1d5db;text-align:center;padding:.65rem;border:1.5px dashed #e5e7eb;border-radius:7px}

/* ── Detail panel ── */
.detail-panel{background:#f5f7ff;border:1px solid #dde3ff;border-radius:8px;padding:.65rem;margin:.04rem 0 .04rem;cursor:default}
.detail-label{font-size:.69rem;color:#6366f1;font-weight:600;margin-bottom:.38rem}
.detail-memo{width:100%;min-height:85px;font-size:.77rem;font-family:'Noto Sans KR',sans-serif;border:1px solid #dde3ff;border-radius:6px;padding:.42rem .52rem;resize:vertical;color:#374151;line-height:1.6;background:#fff}
.detail-memo:focus{outline:none;border-color:#a5b4fc}

/* ── DONE card (completed) ── */
.done-grid{display:flex;flex-wrap:wrap;gap:.32rem;min-height:32px}
.e-chip{display:flex;align-items:center;gap:.32rem;padding:.32rem .48rem;border-radius:7px;background:#f9fafb;border:1px solid #f0f1f3;cursor:grab;user-select:none;transition:all .12s}
.e-chip:hover{background:#f3f4f6}
.e-chip.has-memo-bg{border-left:3px solid #c7d2fe}
.e-chip.dragging{opacity:.3}
.e-badge{font-size:.6rem;padding:.08rem .26rem;border-radius:3px;font-weight:700}
.e-text{font-size:.73rem;color:#9ca3af;text-decoration:line-through}

/* ── Date view ── */
.date-section{display:flex;flex-direction:column;gap:.55rem}
.date-group{display:flex;flex-direction:column;gap:.28rem}
.date-group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.08rem}
.date-group-label{font-size:.73rem;font-weight:600;color:#374151}
.date-group-label.overdue{color:#dc2626}.date-group-label.today-lbl{color:#4f46e5}.date-group-label.soon{color:#d97706}
.date-group-line{flex:1;height:1px;background:#f0f1f3}
.date-group-count{font-size:.65rem;color:#9ca3af}
.date-task-row{display:flex;align-items:center;gap:.45rem;padding:.4rem .6rem;border-radius:8px;background:#f9fafb;border:1px solid #f0f1f3;cursor:pointer;transition:all .12s}
.date-task-row:hover{background:#f3f4f6;border-color:#e5e7eb}
.date-task-row.done-row{opacity:.45}
.date-task-text{font-size:.79rem;color:#374151;flex:1;line-height:1.4}
.date-task-row.done-row .date-task-text{text-decoration:line-through;color:#9ca3af}

/* ── Weekly view ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.week-title{font-size:.9rem;font-weight:600;color:#111827}
.week-nav-btn{background:#f3f4f6;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.8rem;transition:background .12s;font-family:'Noto Sans KR',sans-serif}
.week-nav-btn:hover{background:#e5e7eb}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:.5rem}
.week-col{background:#fff;border-radius:10px;border:1px solid #e8eaf0;overflow:hidden}
.week-col.today-col{border-color:#4f46e5}
.week-col-header{padding:.5rem .45rem;text-align:center;font-size:.72rem;font-weight:600;color:#6b7280;border-bottom:1px solid #f0f1f3}
.week-col.today-col .week-col-header{background:#eef2ff;color:#4f46e5}
.week-col-header .wc-date{font-size:.88rem;font-weight:700;display:block;color:#111827}
.week-col.today-col .wc-date{color:#4f46e5}
.week-col-header .wc-day{font-size:.62rem;color:#9ca3af}
.week-col.sun-wc .wc-day,.week-col.sun-wc .wc-date{color:#ef4444}
.week-col.sat-wc .wc-day,.week-col.sat-wc .wc-date{color:#6366f1}
.week-tasks{padding:.4rem .38rem;display:flex;flex-direction:column;gap:.25rem;min-height:60px}
.week-ev{font-size:.6rem;padding:.1rem .28rem;border-radius:4px;line-height:1.35;cursor:pointer;word-break:keep-all;white-space:normal}
.week-ev:hover{filter:brightness(.92)}
.week-empty{font-size:.62rem;color:#e5e7eb;text-align:center;padding:.5rem 0}
.week-no-date{background:#fff;border-radius:10px;border:1px solid #e8eaf0;padding:.75rem 1rem;margin-top:.6rem}
.week-no-date-title{font-size:.73rem;font-weight:600;color:#6b7280;margin-bottom:.4rem}

/* ── Monthly stats ── */
.month-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:11px;padding:.8rem 1rem;border:1px solid #e8eaf0;text-align:center}
.stat-num{font-size:1.4rem;font-weight:700;color:#111827;line-height:1}
.stat-label{font-size:.68rem;color:#9ca3af;margin-top:.25rem}
.stat-card.stat-done .stat-num{color:#10b981}
.stat-card.stat-overdue .stat-num{color:#ef4444}
.stat-card.stat-week .stat-num{color:#4f46e5}

/* ── Calendar ── */
.cal-wrap{background:#fff;border-radius:13px;padding:1.2rem;border:1px solid #e8eaf0}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.cal-title{font-size:.9rem;font-weight:600;color:#111827}
.cal-nav{background:#f3f4f6;border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:.8rem;transition:background .12s;font-family:'Noto Sans KR',sans-serif}
.cal-nav:hover{background:#e5e7eb}
.cal-legend{display:flex;gap:.6rem;margin-bottom:.75rem;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:.28rem;font-size:.68rem;color:#6b7280}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{font-size:.65rem;font-weight:600;color:#9ca3af;text-align:center;padding:.28rem 0}
.cal-hdr.sun{color:#ef4444}.cal-hdr.sat{color:#6366f1}
.cal-cell{height:90px;border-radius:8px;padding:.28rem .3rem;background:#fafafa;border:1px solid #f0f1f3;overflow-y:auto;display:flex;flex-direction:column;gap:2px;transition:background .12s}
.cal-cell:hover{background:#f3f4f6}
.cal-cell.today{border-color:#4f46e5;background:#eef2ff}
.cal-cell.other{opacity:.3}
.cal-num{font-size:.7rem;font-weight:500;color:#374151;line-height:1;flex-shrink:0}
.cal-cell.today .cal-num{color:#4f46e5;font-weight:700}
.sun-col .cal-num{color:#ef4444}.sat-col .cal-num{color:#6366f1}
.cal-ev{font-size:.58rem;padding:.08rem .24rem;border-radius:3px;line-height:1.35;cursor:pointer;word-break:keep-all;white-space:normal;flex-shrink:0}
.cal-ev:hover{filter:brightness(.9)}
.cal-ev.done-ev{opacity:.4;text-decoration:line-through}
.ev-a{background:#fee2e2;color:#b91c1c}.ev-b{background:#fef3c7;color:#92400e}
.ev-c{background:#d1fae5;color:#065f46}.ev-d{background:#ede9fe;color:#5b21b6}
.ev-e{background:#ffedd5;color:#9a3412}.ev-f{background:#f1f5f9;color:#475569}
.ev-done{background:#f3f4f6;color:#6b7280}

/* ── Date Picker ── */
#dp-popup{position:fixed;z-index:9999;background:#fff;border-radius:11px;padding:.85rem;border:1px solid #e0e0e0;box-shadow:0 8px 28px rgba(0,0,0,.14);display:none;width:220px}
.dp-title{font-size:.71rem;color:#6b7280;font-weight:600;margin-bottom:.4rem}
.dp-input-row{margin-bottom:.35rem}
.dp-input-row input,.dp-input-row select{width:100%;font-size:.8rem;border:1px solid #d1d5db;border-radius:7px;padding:.3rem .42rem;font-family:'Noto Sans KR',sans-serif;background:#fff}
.dp-time-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.3rem;margin-bottom:.35rem}
.dp-time-row select{font-size:.75rem;border:1px solid #d1d5db;border-radius:7px;padding:.28rem .3rem;font-family:'Noto Sans KR',sans-serif;background:#fff}
.dp-btns{display:flex;gap:.35rem;margin-top:.45rem}
.dp-btn{font-size:.7rem;padding:.28rem .5rem;border-radius:6px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .12s}
.dp-btn:hover{background:#f3f4f6}
.dp-ok{background:#4f46e5;color:#fff;border-color:#4f46e5}
.dp-ok:hover{background:#4338ca !important}
.dp-del{color:#dc2626;border-color:#fca5a5;margin-left:auto}

/* ── Modals ── */
.overlay{position:fixed;inset:0;background:rgba(15,15,35,.45);z-index:9998;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal-box{background:#fff;border-radius:16px;padding:1.3rem;width:480px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-box.sm{width:400px}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.75rem}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.1rem;color:#9ca3af;line-height:1}
.modal-close:hover{color:#6b7280}
.modal-task-title{font-size:.9rem;font-weight:600;color:#111827;line-height:1.45;margin-bottom:.5rem}
.modal-meta{font-size:.73rem;color:#6b7280;margin-bottom:.8rem;display:flex;gap:.7rem;flex-wrap:wrap}
.modal-sec{font-size:.73rem;font-weight:600;color:#374151;margin-bottom:.38rem}
.modal-memo{width:100%;min-height:110px;font-size:.78rem;font-family:'Noto Sans KR',sans-serif;border:1px solid #e5e7eb;border-radius:8px;padding:.52rem .62rem;resize:vertical;color:#374151;line-height:1.6;background:#fafafa}
.modal-memo:focus{outline:none;border-color:#a5b4fc;background:#fff}
.modal-divider{border:none;border-top:1px solid #f0f1f3;margin:.7rem 0}
.modal-same-row{display:flex;align-items:center;gap:.42rem;padding:.36rem .48rem;border-radius:6px;background:#f9fafb;border:1px solid #f0f1f3;font-size:.75rem;color:#374151;margin-bottom:.25rem}
.modal-same-row.done-row{opacity:.5;text-decoration:line-through}
.add-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.45rem}
.add-row label{font-size:.74rem;color:#6b7280;white-space:nowrap;font-weight:500;min-width:48px}
.add-row input,.add-row select{flex:1;font-size:.8rem;border:1px solid #d1d5db;border-radius:8px;padding:.38rem .52rem;font-family:'Noto Sans KR',sans-serif;background:#fff}
.add-row input:focus,.add-row select:focus{outline:none;border-color:#a5b4fc}
.add-time-row{display:flex;align-items:center;gap:.45rem;margin-bottom:.45rem}
.add-time-row label{font-size:.74rem;color:#6b7280;white-space:nowrap;font-weight:500;min-width:48px}
.add-time-row select{flex:1;font-size:.8rem;border:1px solid #d1d5db;border-radius:8px;padding:.38rem .52rem;font-family:'Noto Sans KR',sans-serif;background:#fff}

/* ── Settings ── */
.setup-steps{background:#f8f9ff;border:1px solid #dde3ff;border-radius:10px;padding:.8rem .95rem;margin-bottom:.9rem}
.setup-step{font-size:.74rem;color:#374151;line-height:1.8;display:flex;gap:.45rem}
.setup-step-num{font-size:.65rem;font-weight:700;background:#6366f1;color:#fff;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.settings-section{margin-bottom:.85rem}
.settings-label{font-size:.73rem;font-weight:600;color:#374151;margin-bottom:.28rem;display:block}
.settings-input{width:100%;font-size:.8rem;border:1px solid #d1d5db;border-radius:8px;padding:.42rem .55rem;font-family:'Noto Sans KR',sans-serif;margin-bottom:.45rem}
.settings-input:focus{outline:none;border-color:#a5b4fc}
.settings-hint{font-size:.68rem;color:#9ca3af;line-height:1.5;margin-top:-.3rem;margin-bottom:.45rem}
.settings-hint a{color:#6366f1;text-decoration:none}
.settings-actions{display:flex;gap:.45rem;margin-top:.9rem}
.s-btn{flex:1;font-size:.78rem;padding:.46rem .7rem;border-radius:8px;border:1px solid #d1d5db;background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;font-weight:500}
.s-btn:hover{background:#f3f4f6}
.s-btn.primary{background:#4f46e5;color:#fff;border-color:#4f46e5}
.s-btn.primary:hover{background:#4338ca}
.s-btn.danger{color:#dc2626;border-color:#fca5a5}
.s-btn.danger:hover{background:#fff5f5}
#settings-result{font-size:.73rem;margin-top:.65rem;padding:.45rem .6rem;border-radius:7px;display:none}
#settings-result.ok{background:#d1fae5;color:#065f46}
#settings-result.fail{background:#fee2e2;color:#b91c1c}

/* ── Mobile ── */
@media(max-width:640px){
  .header{padding:.65rem 1rem}
  .header-date{display:none}
  .sync-pill span:last-child{display:none}
  .nav{padding:0 .25rem;top:42px}
  .nav-btn{padding:.6rem .7rem;font-size:.75rem;flex:1;text-align:center}
  .content{padding:.8rem .9rem;gap:.75rem}
  .grid{grid-template-columns:1fr;gap:.75rem}
  .col-span-2{grid-column:1}
  .card{padding:.85rem .85rem .8rem}
  .edit-btn{opacity:1 !important}
  .add-task-btn{width:24px;height:24px}
  .overlay{align-items:flex-end}
  .modal-box{width:100% !important;max-width:100% !important;border-radius:18px 18px 0 0;padding:1.1rem 1.1rem 1.8rem;max-height:90vh}
  .week-grid{grid-template-columns:repeat(7,1fr);gap:2px}
  .week-col-header{padding:.38rem .2rem;font-size:.6rem}
  .week-col-header .wc-date{font-size:.75rem}
  .week-ev{font-size:.55rem;padding:.07rem .18rem}
  .week-tasks{padding:.3rem .25rem;gap:.2rem;min-height:45px}
  .cal-cell{height:72px}
  .month-stats{grid-template-columns:repeat(2,1fr);gap:.5rem}
  .stat-num{font-size:1.15rem}
  #dp-popup{left:50% !important;top:50% !important;transform:translate(-50%,-50%) !important;width:240px}
}
@media(max-width:400px){.week-col-header .wc-date{font-size:.68rem}.week-ev{font-size:.5rem}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">업무 대시보드</div>
  <div class="header-right">
    <div class="header-date" id="hdate"></div>
    <button class="sync-pill" onclick="openSettings()">
      <span class="sync-dot none" id="sync-dot"></span>
      <span id="sync-text">GitHub 연동</span>
    </button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="tab1" onclick="showPage(1)">업무 현황</button>
  <button class="nav-btn" id="tab2" onclick="showPage(2)">주간 현황</button>

<script>
const WD=['일','월','화','수','목','금','토'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const TODAY=new Date(); TODAY.setHours(0,0,0,0);
const TODAYSTR=TODAY.toISOString().slice(0,10);

const CCFG={
  A:{label:'A',title:'중요도 높음 · 긴급',cls:'a'},
  B:{label:'B',title:'중요도 높음 · 긴급 아님',cls:'b'},
  C:{label:'C',title:'Daily 업무',cls:'c',daily:true},
  D:{label:'D',title:'타부서 요청',cls:'d'},
  E:{label:'E',title:'중요도 낮음 · 긴급',cls:'e'},
  F:{label:'F',title:'중요도 낮음 · 긴급 아님',cls:'f'},
  DONE:{label:'완료',title:'완료',cls:'done'},
};

const INIT=[
  {id:'a1',text:'샌드위치 휴가 미사용자 명단 취합',due:'2026-05-02',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'A',prev:'A'},
  {id:'a2',text:'5/11 입사자 준비',due:'2026-05-11',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'A',prev:'A'},
  {id:'a3',text:'B-GPT 오픈',due:'2026-05-15',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'A',prev:'A'},
  {id:'a4',text:'AI OJT 수정',due:'2026-05-08',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'A',prev:'A'},
  {id:'b1',text:'26년 도약장려금 신청자 확인',due:'2026-05-20',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'B',prev:'B'},
  {id:'b2',text:'퇴사자 반영',due:'2026-05-05',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'B',prev:'B'},
  {id:'c1',text:'인재서칭 및 포지션 제안',due:'',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'C',prev:'C'},
  {id:'c2',text:'휴가관리',due:'',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'C',prev:'C'},
  {id:'d1',text:'명함 승인',due:'2026-04-29',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'D',prev:'D'},
  {id:'d2',text:'개명 직원 EDI 신고',due:'2026-04-30',dueAmpm:'',dueHour:'',dueMin:'00',memo:'',card:'D',prev:'D'},
];

let tasks=JSON.parse(localStorage.getItem('wdv6')||'null')||INIT.map(t=>({...t}));
let expandedId=null,dragId=null,dpId=null,editId=null;
let calY=TODAY.getFullYear(),calM=TODAY.getMonth();
let weekOffset=0;
let curPage=1;
let ghSha=null,syncTimer=null;

/* ── Migration: old 'E' (completed) → 'DONE' ── */
let migrated=false;
tasks=tasks.map(t=>{
  const c=t.card==='E'?'DONE':t.card;
  const p=t.prev==='E'?'DONE':t.prev;
  if(c!==t.card||p!==t.prev)migrated=true;
  return{...t,card:c,prev:p,dueMin:t.dueMin||'00'};
});
if(migrated)save();

/* ══════ Helpers ══════ */
function isMobile(){return window.innerWidth<=640;}
function hasMemo(t){return!!(t.memo&&t.memo.trim())}
function fmtTime(t){
  if(!t||!t.dueAmpm||!t.dueHour)return '';
  return` ${t.dueAmpm} ${t.dueHour}:${t.dueMin||'00'}`;
}
function fmtDue(t){
  if(!t||!t.due)return '기한없음';
  const x=new Date(t.due);
  const base=`${x.getMonth()+1}/${x.getDate()}`;
  const tm=fmtTime(t);
  return tm?base+tm:base;
}
function fmtDueFull(t){
  if(!t||!t.due)return '기한없음';
  const x=new Date(t.due);
  const base=`${x.getFullYear()}.${x.getMonth()+1}.${x.getDate()}(${WD[x.getDay()]})`;
  const tm=fmtTime(t);
  return tm?base+tm:base;
}
function isUrgent(t){if(!t||!t.due)return false;return(new Date(t.due)-TODAY)/86400000<=2}
function dayDiff(d){if(!d)return null;return Math.ceil((new Date(d)-TODAY)/86400000)}
function getT(id){return tasks.find(t=>t.id===id)}
function byCard(c){return tasks.filter(t=>t.card===c)}
function isMobile(){return window.innerWidth<=640}
function isDailyDoneToday(t){return t.card==='C'&&t.lastDone===TODAYSTR}

function dueSort(a,b){
  if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;
  const da=new Date(a.due),db=new Date(b.due);
  if(da-db!==0)return da-db;
  const toMin=(ap,hr,mn)=>{
    if(!ap||!hr)return 9999;
    let h=parseInt(hr),m=parseInt(mn||0);
    if(ap==='오전'&&h===12)h=0;
    if(ap==='오후'&&h!==12)h+=12;
    return h*60+m;
  };
  return toMin(a.dueAmpm,a.dueHour,a.dueMin)-toMin(b.dueAmpm,b.dueHour,b.dueMin);
}

/* ══════ GitHub Sync ══════ */
function getGHS(){return JSON.parse(localStorage.getItem('ghSettings')||'null')}
function b64enc(s){return btoa(unescape(encodeURIComponent(s)))}
function b64dec(s){return decodeURIComponent(escape(atob(s.replace(/\n/g,''))))}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(!dot||!txt)return;
  dot.className='sync-dot '+s;
  const m={none:'GitHub 연동',loading:'불러오는 중…',saving:'저장 중…',synced:'동기화됨',error:'오류 발생',ready:'연결됨'};
  txt.textContent=m[s]||'GitHub 연동';
}
async function ghFetch(path,opts={}){
  const s=getGHS();if(!s?.token)return null;
  return fetch(`https://api.github.com/repos/${s.owner}/${s.repo}/contents/${path}`,
    {...opts,headers:{Authorization:`token ${s.token}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json',...(opts.headers||{})}});
}
async function ghLoad(){
  const s=getGHS();if(!s?.token){setSyncStatus('none');return;}
  setSyncStatus('loading');
  try{
    const r=await ghFetch('tasks.json');
    if(r.status===404){setSyncStatus('ready');return;}
    if(!r.ok){setSyncStatus('error');return;}
    const data=await r.json();
    const parsed=JSON.parse(b64dec(data.content));
    tasks=parsed.map(t=>({...t,dueMin:t.dueMin||'00'}));
    /* migration after load */
    tasks=tasks.map(t=>{
      const c=t.card==='E'?'DONE':t.card;
      const p=t.prev==='E'?'DONE':t.prev;
      return{...t,card:c,prev:p};
    });
    ghSha=data.sha;
    setSyncStatus('synced');
    renderCurrent();
  }catch(e){setSyncStatus('error');}
}
async function ghSave(){
  const s=getGHS();if(!s?.token)return;
  setSyncStatus('saving');
  const body={message:`업무 현황 업데이트 ${new Date().toLocaleString('ko-KR')}`,content:b64enc(JSON.stringify(tasks,null,2))};
  if(ghSha)body.sha=ghSha;
  try{
    const r=await ghFetch('tasks.json',{method:'PUT',body:JSON.stringify(body)});
    if(!r.ok){setSyncStatus('error');return;}
    const data=await r.json();
    ghSha=data.content.sha;
    setSyncStatus('synced');
  }catch(e){setSyncStatus('error');}
}
function save(){
  localStorage.setItem('wdv6',JSON.stringify(tasks));
  clearTimeout(syncTimer);
  syncTimer=setTimeout(ghSave,1800);
}

/* ══════ Settings Modal ══════ */
function openSettings(){
  const s=getGHS()||{};
  document.getElementById('s-owner').value=s.owner||'';
  document.getElementById('s-repo').value=s.repo||'';
  document.getElementById('s-token').value=s.token||'';
  document.getElementById('settings-result').style.display='none';
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');}
function getSettingsInput(){
  return{owner:document.getElementById('s-owner').value.trim(),
         repo:document.getElementById('s-repo').value.trim(),
         token:document.getElementById('s-token').value.trim()};
}
function showSettingsResult(msg,ok){
  const el=document.getElementById('settings-result');
  el.textContent=msg;el.className=ok?'ok':'fail';el.style.display='block';
}
async function testConnection(){
  const s=getSettingsInput();
  if(!s.owner||!s.repo||!s.token){showSettingsResult('모든 항목을 입력해주세요.',false);return;}
  showSettingsResult('연결 확인 중…',true);
  try{
    const r=await fetch(`https://api.github.com/repos/${s.owner}/${s.repo}`,{headers:{Authorization:`token ${s.token}`}});
    r.ok?showSettingsResult('연결 성공!',true):showSettingsResult(`연결 실패 (${r.status})`,false);
  }catch(e){showSettingsResult('네트워크 오류',false);}
}
async function saveSettings(){
  const s=getSettingsInput();
  if(!s.owner||!s.repo||!s.token){showSettingsResult('모든 항목을 입력해주세요.',false);return;}
  localStorage.setItem('ghSettings',JSON.stringify(s));
  closeSettings();ghSha=null;await ghLoad();
}
function clearSettings(){
  if(!confirm('GitHub 연동을 해제하시겠습니까?'))return;
  localStorage.removeItem('ghSettings');ghSha=null;setSyncStatus('none');closeSettings();
}

/* ══════ Page switch ══════ */
function showPage(n){
  curPage=n;
  [1,2,3,4].forEach(i=>{
    document.getElementById('tab'+i).classList.toggle('active',i===n);
    document.getElementById('page'+i).style.display=i===n?'block':'none';
  });
  renderCurrent();
}
function renderCurrent(){
  if(curPage===1)renderP1();
  else if(curPage===2)renderWeekly();
  else if(curPage===3)renderMonthly();
  else if(curPage===4)renderCalendar();
}

/* ══════════════ PAGE 1 — 업무 현황 ══════════════ */
function renderP1(){
  let h='<div class="grid">';
  for(const ck of['A','B','C','D','E','F']){
    const ci=CCFG[ck];
    const ct=[...tasks.filter(t=>t.card===ck)].sort(dueSort);
    h+=`<div class="card" id="card-${ck}"
      ondragover="dOver(event,'${ck}')" ondragleave="dLeave(event,'${ck}')" ondrop="dDrop(event,'${ck}')">
      <div class="card-strip strip-${ci.cls}"></div>
      <div class="card-header">
        <span class="badge badge-${ci.cls}">${ci.label}</span>
        <div class="card-title">${ci.title}</div>
        <span class="count-badge">${ct.length}건</span>
        <button class="add-task-btn" onclick="openAdd('${ck}')" title="업무 추가">+</button>
      </div>
      <div class="task-list">`;
    if(!ct.length)h+=`<div class="drop-hint">${isMobile()?'수정으로 카드 이동':'드래그하여 이동'}</div>`;
    for(const t of ct){
      const exp=expandedId===t.id,urg=isUrgent(t),hm=hasMemo(t);
      const isDaily=ci.daily,isDailyDone=isDailyDoneToday(t);
      h+=`<div class="task-item${hm?' has-memo-bg':''}${isDailyDone?' daily-done-today':''}" id="ti-${t.id}" draggable="true"
          ondragstart="dStart(event,'${t.id}')"
          ondblclick="toggleExp('${t.id}')"
          ontouchend="tapExp(event,'${t.id}')">
        <input type="checkbox" class="task-checkbox" ${isDailyDone?'checked':''}
          onclick="event.stopPropagation();toggleDone('${t.id}')">
        <span class="memo-dot${hm?' has-memo':''}"
          onclick="event.stopPropagation();toggleExp('${t.id}')"></span>
        <span class="task-text${isDailyDone?' daily-done-text':''}">${t.text}</span>
        ${isDailyDone?`<span class="daily-reset-badge">오늘 완료</span>`:''}
        <button class="edit-btn" onclick="event.stopPropagation();openEdit('${t.id}')">수정</button>
        <span class="task-due${urg?' urgent':''}${!t.due?' nodate':''}"
          onclick="event.stopPropagation();openDP('${t.id}',event)">${fmtDue(t)}</span>
      </div>`;
      if(exp){
        const hint=isMobile()?'점 탭으로 닫기':'더블클릭으로 닫기';
        h+=`<div class="detail-panel" ondragstart="event.stopPropagation()" ondblclick="event.stopPropagation()">
          <div class="detail-label">상세 메모 &nbsp;·&nbsp; <span style="font-weight:400;color:#9ca3af">${hint}</span></div>
          <textarea class="detail-memo"
            placeholder="상세 내용, 진행 상황, 특이사항 등을 자유롭게 입력하세요..."
            oninput="pMemo('${t.id}',this.value)"
            onclick="event.stopPropagation()">${t.memo||''}</textarea>
        </div>`;
      }
    }
    h+=`</div></div>`;
  }
  /* DONE card */
  const dt=[...tasks.filter(t=>t.card==='DONE')];
  h+=`<div class="card col-span-2" id="card-DONE"
    ondragover="dOver(event,'DONE')" ondragleave="dLeave(event,'DONE')" ondrop="dDrop(event,'DONE')">
    <div class="card-strip strip-done"></div>
    <div class="card-header">
      <span class="badge badge-done">완료</span>
      <div class="card-title">완료된 업무</div>
      <span class="count-badge">${dt.length}건</span>
      <span style="font-size:.67rem;color:#9ca3af;margin-left:.3rem">더블클릭으로 메모 확인</span>
    </div>
    <div class="done-grid">`;
  if(!dt.length)h+=`<div class="drop-hint" style="width:100%">체크박스 또는 드래그로 완료 처리</div>`;
  for(const t of dt){
    const pci=CCFG[t.prev||'A']||CCFG['A'],hm=hasMemo(t);
    h+=`<div class="e-chip${hm?' has-memo-bg':''}" id="ti-${t.id}" draggable="true"
        ondragstart="dStart(event,'${t.id}')"
        ondblclick="openMemoModal('${t.id}')">
      <input type="checkbox" class="task-checkbox" checked onclick="event.stopPropagation();toggleDone('${t.id}')">
      ${hm?`<span class="memo-dot has-memo" onclick="event.stopPropagation();openMemoModal('${t.id}')"></span>`:'<span style="width:7px;flex-shrink:0"></span>'}
      <span class="e-badge badge-${pci.cls}">${t.prev||'A'}</span>
      <span class="e-text">${t.text}</span>
      <button class="edit-btn" onclick="event.stopPropagation();openEdit('${t.id}')">수정</button>
    </div>`;
  }
  h+=`</div></div></div>${buildDateView()}`;
  document.getElementById('page1').innerHTML=h;
}

/* ── Date view ── */
function buildDateView(){
  const groups=[
    {lc:'overdue',label:'기한 초과',items:[]},{lc:'today-lbl',label:'오늘 마감',items:[]},
    {lc:'soon',label:'7일 이내',items:[]},{lc:'',label:'이후',items:[]},{lc:'',label:'기한 없음',items:[]},
  ];
  const active=tasks.filter(t=>t.card!=='DONE'||true); // include all
  const sorted=[...tasks].sort(dueSort);
  for(const t of sorted){
    if(!t.due){groups[4].items.push(t);continue;}
    const d=dayDiff(t.due);
    if(d<0)groups[0].items.push(t);
    else if(d===0)groups[1].items.push(t);
    else if(d<=7)groups[2].items.push(t);
    else groups[3].items.push(t);
  }
  const activeGroups=groups.filter(g=>g.items.length);
  let h=`<div class="card">
    <div class="card-strip strip-date"></div>
    <div class="card-header">
      <div class="card-title">일자별 업무 현황</div>
      <span class="count-badge">${tasks.length}건 전체</span>
    </div>
    <div class="date-section">`;
  if(!activeGroups.length)h+=`<div style="font-size:.73rem;color:#d1d5db;text-align:center;padding:.6rem">등록된 업무가 없습니다</div>`;
  for(const g of activeGroups){
    h+=`<div class="date-group">
      <div class="date-group-header">
        <span class="date-group-label ${g.lc}">${g.label}</span>
        <span class="date-group-count">${g.items.length}건</span>
        <div class="date-group-line"></div>
      </div>`;
    const byDate={};
    for(const t of g.items){const k=t.due||'nodate';(byDate[k]=byDate[k]||[]).push(t);}
    for(const dk of Object.keys(byDate).sort()){
      if(dk!=='nodate'){
        const dd=new Date(dk);
        h+=`<div style="font-size:.69rem;color:#6b7280;padding:.18rem .4rem;font-weight:500">${dd.getMonth()+1}월 ${dd.getDate()}일 (${WD[dd.getDay()]})</div>`;
      }
      for(const t of byDate[dk]){
        const ci=CCFG[t.card]||CCFG['DONE'];
        const hm=hasMemo(t),done=t.card==='DONE',tm=fmtTime(t);
        const isDD=isDailyDoneToday(t);
        h+=`<div class="date-task-row${(done||isDD)?' done-row':''}" onclick="openMemoModal('${t.id}')">
          <input type="checkbox" class="task-checkbox" ${(done||isDD)?'checked':''} onclick="event.stopPropagation();toggleDone('${t.id}')">
          ${hm?`<span class="memo-dot has-memo"></span>`:`<span style="width:7px;flex-shrink:0"></span>`}
          <span class="badge badge-${ci.cls}">${ci.label}</span>
          <span class="date-task-text">${t.text}</span>
          ${tm?`<span style="font-size:.65rem;color:#6b7280;white-space:nowrap">${tm}</span>`:''}
          ${done?`<span style="font-size:.65rem;color:#10b981;font-weight:500">완료</span>`:''}
          ${isDD?`<span style="font-size:.65rem;color:#10b981;font-weight:500">오늘 완료</span>`:''}
        </div>`;
      }
    }
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

/* ══════════════ PAGE 2 — 주간 현황 ══════════════ */
function getMonday(d){
  const day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  const m=new Date(d);m.setDate(diff);m.setHours(0,0,0,0);return m;
}
function renderWeekly(){
  const base=getMonday(new Date());
  base.setDate(base.getDate()+weekOffset*7);
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);
  }
  const ws=days[0],we=days[6];
  const titleStr=`${ws.getMonth()+1}/${ws.getDate()} – ${we.getMonth()+1}/${we.getDate()}`;
  const evMap={};
  for(const t of tasks){
    if(!t.due)continue;
    const ds=t.due;
    const idx=days.findIndex(d=>d.toISOString().slice(0,10)===ds);
    if(idx>=0){if(!evMap[idx])evMap[idx]=[];evMap[idx].push(t);}
  }
  const noDateTasks=tasks.filter(t=>!t.due&&t.card!=='DONE');
  const dayNames=['월','화','수','목','금','토','일'];
  let h=`<div class="card">
    <div class="card-strip strip-date"></div>
    <div class="week-nav">
      <button class="week-nav-btn" onclick="moveWeek(-1)">◀</button>
      <div class="week-title">${ws.getFullYear()}년 &nbsp; ${titleStr}</div>
      <button class="week-nav-btn" onclick="moveWeek(1)">▶</button>
    </div>
    <div class="week-grid">`;
  for(let i=0;i<7;i++){
    const d=days[i];
    const ds=d.toISOString().slice(0,10);
    const isT=ds===TODAYSTR;
    const isSun=d.getDay()===0,isSat=d.getDay()===6;
    const colCls=`week-col${isT?' today-col':''}${isSun?' sun-wc':''}${isSat?' sat-wc':''}`;
    h+=`<div class="${colCls}">
      <div class="week-col-header">
        <span class="wc-date">${d.getDate()}</span>
        <span class="wc-day">${dayNames[i]}</span>
      </div>
      <div class="week-tasks">`;
    if(evMap[i]){
      for(const t of evMap[i]){
        const ci=CCFG[t.card]||CCFG['DONE'];
        h+=`<div class="week-ev ev-${ci.cls}${t.card==='DONE'?' done-ev':''}"
          onclick="openMemoModal('${t.id}')">${t.text}</div>`;
      }
    } else {
      h+=`<div class="week-empty">—</div>`;
    }
    h+=`</div></div>`;
  }
  h+=`</div>`;
  if(noDateTasks.length){
    h+=`<div class="week-no-date">
      <div class="week-no-date-title">기한없음 업무 (${noDateTasks.length}건)</div>`;
    for(const t of noDateTasks){
      const ci=CCFG[t.card];
      h+=`<div class="date-task-row" style="margin-bottom:.25rem" onclick="openMemoModal('${t.id}')">
        <span class="badge badge-${ci.cls}">${ci.label}</span>
        <span class="date-task-text">${t.text}</span>
      </div>`;
    }
    h+=`</div>`;
  }
  h+=`</div>`;
  document.getElementById('page2').innerHTML=h;
}
function moveWeek(dir){weekOffset+=dir;renderWeekly();}

/* ══════════════ PAGE 3 — 월간 현황 ══════════════ */
function renderMonthly(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.card==='DONE').length;
  const overdue=tasks.filter(t=>t.due&&t.card!=='DONE'&&dayDiff(t.due)<0).length;
  const thisWeek=tasks.filter(t=>t.due&&t.card!=='DONE'&&dayDiff(t.due)>=0&&dayDiff(t.due)<=7).length;
  let h=`<div class="month-stats">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">전체 업무</div></div>
    <div class="stat-card stat-done"><div class="stat-num">${done}</div><div class="stat-label">완료</div></div>
    <div class="stat-card stat-overdue"><div class="stat-num">${overdue}</div><div class="stat-label">기한 초과</div></div>
    <div class="stat-card stat-week"><div class="stat-num">${thisWeek}</div><div class="stat-label">이번 주 마감</div></div>
  </div>`;
  /* calendar for the month */
  h+=buildCalHTML(calY,calM,true);
  document.getElementById('page3').innerHTML=h;
}

/* ══════════════ PAGE 4 — 마감 캘린더 ══════════════ */
function renderCalendar(){
  document.getElementById('page4').innerHTML=buildCalHTML(calY,calM,false);
}

function buildCalHTML(y,m,isMonthly){
  const startDay=new Date(y,m,1).getDay();
  const lastDate=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const evMap={};
  for(const t of tasks){
    if(!t.due)continue;
    const d=new Date(t.due);
    if(d.getFullYear()===y&&d.getMonth()===m){
      const k=d.getDate();(evMap[k]=evMap[k]||[]).push(t);
    }
  }
  const changeFn=isMonthly?'calChange':'calChange';
  let h=`<div class="cal-wrap">
    <div class="cal-legend">
      <span class="leg-item"><span class="leg-dot" style="background:#ef4444"></span>A</span>
      <span class="leg-item"><span class="leg-dot" style="background:#f59e0b"></span>B</span>
      <span class="leg-item"><span class="leg-dot" style="background:#10b981"></span>C</span>
      <span class="leg-item"><span class="leg-dot" style="background:#8b5cf6"></span>D</span>
      <span class="leg-item"><span class="leg-dot" style="background:#fb923c"></span>E</span>
      <span class="leg-item"><span class="leg-dot" style="background:#94a3b8"></span>F</span>
    </div>
    <div class="cal-header">
      <button class="cal-nav" onclick="calChange(-1)">◀</button>
      <div class="cal-title">${y}년 ${MONTHS[m]}</div>
      <button class="cal-nav" onclick="calChange(1)">▶</button>
    </div>
    <div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach((n,i)=>{
    h+=`<div class="cal-hdr${i===0?' sun':i===6?' sat':''}">${n}</div>`;
  });
  for(let i=0;i<startDay;i++){
    const cc=i===0?' sun-col':i===6?' sat-col':'';
    h+=`<div class="cal-cell other${cc}"><div class="cal-num">${prevLast-startDay+i+1}</div></div>`;
  }
  for(let d=1;d<=lastDate;d++){
    const col=(startDay+d-1)%7,cc=col===0?' sun-col':col===6?' sat-col':'';
    const isT=y===TODAY.getFullYear()&&m===TODAY.getMonth()&&d===TODAY.getDate();
    h+=`<div class="cal-cell${isT?' today':''}${cc}"><div class="cal-num">${d}</div>`;
    if(evMap[d])for(const t of evMap[d]){
      const ci=CCFG[t.card]||CCFG['DONE'],hm=hasMemo(t);
      h+=`<div class="cal-ev ev-${ci.cls}${t.card==='DONE'?' done-ev':''}"
        onclick="openMemoModal('${t.id}')">${hm?'●':''} ${t.text}</div>`;
    }
    h+=`</div>`;
  }
  const rem=(7-(startDay+lastDate)%7)%7;
  for(let d=1;d<=rem;d++){
    const col=(startDay+lastDate+d-1)%7,cc=col===0?' sun-col':col===6?' sat-col':'';
    h+=`<div class="cal-cell other${cc}"><div class="cal-num">${d}</div></div>`;
  }
  h+=`</div></div>`;
  return h;
}
function calChange(dir){
  calM+=dir;
  if(calM>11){calM=0;calY++;}
  if(calM<0){calM=11;calY--;}
  renderCurrent();
}

/* ══════ Task actions ══════ */
function toggleDone(id){
  const t=getT(id);if(!t)return;
  if(t.card==='C'){
    /* Daily: toggle lastDone for today */
    t.lastDone=(t.lastDone===TODAYSTR)?'':TODAYSTR;
  } else if(t.card!=='DONE'){
    t.prev=t.card;t.card='DONE';
  } else {
    t.card=t.prev||'A';
  }
  if(expandedId===id)expandedId=null;
  save();renderCurrent();
}

function toggleExp(id){
  expandedId=(expandedId===id)?null:id;
  renderP1();
  if(expandedId===id){
    setTimeout(()=>{
      const ti=document.getElementById('ti-'+id);
      if(ti?.nextElementSibling){
        const ta=ti.nextElementSibling.querySelector('.detail-memo');
        if(ta)ta.focus();
      }
    },30);
  }
}

function pMemo(id,v){
  const t=getT(id);if(t){t.memo=v;save();}
  const ti=document.getElementById('ti-'+id);
  if(ti){
    const dot=ti.querySelector('.memo-dot'),has=!!(v&&v.trim());
    if(dot)dot.classList.toggle('has-memo',has);
    ti.classList.toggle('has-memo-bg',has);
  }
}

/* ══════ Modals ══════ */
function openMemoModal(id){
  const t=getT(id);if(!t)return;
  const ci=CCFG[t.card]||CCFG['DONE'];
  const pci=CCFG[t.prev||t.card]||CCFG['A'];
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-top">
      <div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">
        <span class="badge badge-${ci.cls}">${ci.label} ${ci.title}</span>
        ${t.card==='DONE'?`<span class="badge badge-${pci.cls}" style="opacity:.6">${pci.label}에서 완료</span>`:''}
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-task-title">${t.text}</div>
    <div class="modal-meta">
      <span>마감 ${fmtDueFull(t)}</span>
      <span>${t.card==='DONE'?'✅ 완료':isDailyDoneToday(t)?'✅ 오늘 완료':'⏳ 진행 중'}</span>
    </div>
    <div class="modal-sec">상세 메모</div>
    <textarea class="modal-memo" placeholder="상세 내용, 진행상황 등을 입력하세요..."
      oninput="pMemo('${t.id}',this.value)">${t.memo||''}</textarea>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

/* ══════ Drag & Drop ══════ */
function dStart(e,id){
  dragId=id;e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById('ti-'+id);if(el)el.classList.add('dragging');},0);
}
function dOver(e,ck){e.preventDefault();document.getElementById('card-'+ck)?.classList.add('drag-over');}
function dLeave(e,ck){const c=document.getElementById('card-'+ck);if(c&&!c.contains(e.relatedTarget))c.classList.remove('drag-over');}
function dDrop(e,ck){
  e.preventDefault();
  document.getElementById('card-'+ck)?.classList.remove('drag-over');
  if(!dragId)return;
  const t=getT(dragId);
  if(!t||t.card===ck){dragId=null;return;}
  if(t.card!=='DONE')t.prev=t.card;
  t.card=ck;
  if(expandedId===dragId)expandedId=null;
  dragId=null;save();renderCurrent();
}

/* ══════ Date Picker ══════ */
function openDP(id,e){
  dpId=id;
  const t=getT(id);
  document.getElementById('dp-date').value=t?.due||'';
  document.getElementById('dp-ampm').value=t?.dueAmpm||'';
  document.getElementById('dp-hour').value=t?.dueHour||'';
  document.getElementById('dp-min').value=t?.dueMin||'00';
  const dp=document.getElementById('dp-popup');
  dp.style.display='block';
  if(!isMobile()){
    dp.style.transform='none';
    const r=e.target.getBoundingClientRect();
    let x=r.left,y=r.bottom+5;
    if(x+225>window.innerWidth)x=window.innerWidth-230;
    if(y+190>window.innerHeight)y=r.top-190;
    dp.style.left=x+'px';dp.style.top=y+'px';
  }
}
function applyDate(){
  const t=getT(dpId);
  if(t){
    t.due=document.getElementById('dp-date').value;
    t.dueAmpm=document.getElementById('dp-ampm').value||'';
    t.dueHour=document.getElementById('dp-hour').value||'';
    t.dueMin=document.getElementById('dp-min').value||'00';
    save();renderCurrent();
  }
  closeDP();
}
function clearDate(){
  const t=getT(dpId);
  if(t){t.due='';t.dueAmpm='';t.dueHour='';t.dueMin='00';save();renderCurrent();}
  closeDP();
}
function closeDP(){document.getElementById('dp-popup').style.display='none';dpId=null;}
document.addEventListener('click',e=>{
  const dp=document.getElementById('dp-popup');
  if(dp.style.display!=='none'&&!dp.contains(e.target)&&!e.target.classList.contains('task-due'))closeDP();
});

/* ══════ Edit / Add / Delete ══════ */
function openEdit(id){
  const t=getT(id);if(!t)return;
  editId=id;
  document.getElementById('edit-text').value=t.text;
  document.getElementById('edit-card').value=t.card;
  document.getElementById('edit-due').value=t.due||'';
  document.getElementById('edit-ampm').value=t.dueAmpm||'';
  document.getElementById('edit-hour').value=t.dueHour||'';
  document.getElementById('edit-min').value=t.dueMin||'00';
  document.getElementById('edit-overlay').classList.add('open');
  setTimeout(()=>{const el=document.getElementById('edit-text');el.focus();el.select();},80);
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');editId=null;}
function submitEdit(){
  const text=document.getElementById('edit-text').value.trim();
  if(!text){document.getElementById('edit-text').focus();return;}
  const t=getT(editId);if(!t)return;
  const nc=document.getElementById('edit-card').value;
  if(t.card!=='DONE'&&nc!=='DONE')t.prev=nc;
  else if(nc==='DONE')t.prev=t.card;
  t.text=text;t.card=nc;
  t.due=document.getElementById('edit-due').value;
  t.dueAmpm=document.getElementById('edit-ampm').value||'';
  t.dueHour=document.getElementById('edit-hour').value||'';
  t.dueMin=document.getElementById('edit-min').value||'00';
  if(expandedId===editId)expandedId=null;
  closeEdit();save();renderCurrent();
}
function deleteTask(){
  if(!confirm('이 업무를 삭제하시겠습니까?'))return;
  tasks=tasks.filter(t=>t.id!==editId);
  if(expandedId===editId)expandedId=null;
  closeEdit();save();renderCurrent();
}
function openAdd(card){
  ['add-text','add-due'].forEach(id=>document.getElementById(id).value='');
  ['add-ampm','add-hour'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('add-min').value='00';
  document.getElementById('add-card').value=card||'A';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('add-text').focus(),80);
}
function closeAdd(){document.getElementById('add-overlay').classList.remove('open');}
function submitAdd(){
  const text=document.getElementById('add-text').value.trim();
  if(!text){document.getElementById('add-text').focus();return;}
  const card=document.getElementById('add-card').value;
  tasks.push({
    id:'t'+Date.now(),text,
    due:document.getElementById('add-due').value,
    dueAmpm:document.getElementById('add-ampm').value||'',
    dueHour:document.getElementById('add-hour').value||'',
    dueMin:document.getElementById('add-min').value||'00',
    memo:'',card,prev:card
  });
  closeAdd();save();renderCurrent();
}

/* ══════ Touch ══════ */
let lastTap={id:null,t:0};
function tapExp(e,id){
  const now=Date.now();
  if(lastTap.id===id&&now-lastTap.t<350){e.preventDefault();toggleExp(id);}
  lastTap={id,t:now};
}

/* ══════ Init ══════ */
document.getElementById('hdate').textContent=
  `${TODAY.getFullYear()}년 ${TODAY.getMonth()+1}월 ${TODAY.getDate()}일 (${WD[TODAY.getDay()]})`;
renderP1();
ghLoad();
</script>
